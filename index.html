<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Holy Breyble</title>
<link rel="<st></st>ylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="container">
<h1><i class="fas fa-book-open"></i> The Holy Breyble</h1>
<p class="subtitle">hello good day , welcome</p>
<div id="daily-verse" class="daily-verse"><strong>Daily Verse:</strong> Loading...</div>
<div class="search-container">
<input type="text" id="search-input" placeholder="Search for verses or keywords...">
<button id="search-btn">Search</button>
</div>
<div id="search-results"></div>

<div class="testament">
<h2><i class="fas fa-scroll"></i> Old Testament</h2>
<div class="book-list" id="old-testament-books"></div>
</div>
<div class="testament">
<h2><i class="fas fa-cross"></i> New Testament</h2>
<div class="book-list" id="new-testament-books"></div>
</div>

<div class="reflection-list" id="reflection-list"></div>
<div id="reading-area"></div>
</div>

<!-- Reflection Modal -->
<div id="reflectionModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:999;">
  <div id="reflectionContent" style="background:white;padding:20px;border-radius:10px;max-width:600px;width:90%;position:relative;">
    <h3>Reflect on this verse</h3>
    <textarea id="reflectionText" placeholder="Share your thoughts or lesson learned..." style="width:100%;height:150px;padding:10px;border-radius:6px;border:1px solid #bdc3c7;resize:none;font-size:1em;"></textarea>
    <br>
    <button id="saveReflectionBtn" style="margin-top:10px;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;color:white;background:#27ae60;">💾 Save</button>
    <button id="closeReflectionBtn" style="margin-top:10px;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;color:white;background:#e74c3c;margin-left:10px;">✖ Close</button>
  </div>
</div>

<script src="script.js">
</body>
</html>
